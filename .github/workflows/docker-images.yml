name: Docker · publish images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to 'manual' on workflow_dispatch)"
        required: false
        type: string
        default: "manual"
      target:
        description: "Which image to build"
        required: true
        type: choice
        default: "both"
        options:
          - origin
          - cloud
          - both

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: ghcr.io/apprider/gemmapod-${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image: [origin, cloud]

    steps:
      - name: Skip if not selected
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target != 'both' && inputs.target != matrix.image }}
        run: |
          echo "::notice::skipping ${{ matrix.image }} (not selected)"
          exit 0

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          base="ghcr.io/apprider/gemmapod-${{ matrix.image }}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Changesets tag format: @gemmapod/<pkg>@<semver>
            tag="${{ github.event.release.tag_name }}"
            # Skip this matrix entry if the release was for a different package.
            if [[ "$tag" != *"@gemmapod/${{ matrix.image }}@"* ]]; then
              echo "::notice::release tag $tag does not match ${{ matrix.image }} — skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            version="${tag##*@}"
            echo "tags=$base:$version,$base:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=$base:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push
        if: steps.tags.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
